<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #d6e4f7;
        margin: 0;
        padding: 20px;
    }

    h1 {
        text-align: center;
    }

    table {
        width: 60%;
        margin: 20px auto;
        border-collapse: collapse;
        background: white;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    th, td {
        padding: 12px;
        text-align: center;
        border-bottom: 1px solid #ddd;
    }

    th {
        background-color: #007bff;
        color: white;
    }

    tr:hover {
        background-color: #f1f1f1;
    }

    a {
        text-decoration: none;
        padding: 6px 10px;
        border-radius: 4px;
        color: white;
    }

    a.edit {
        background-color: #28a745;
    }

    a.delete {
        background-color: #dc3545;
    }

    form {
        width: 300px;
        margin: 30px auto;
        padding: 20px;
        background: white;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        border-radius: 8px;
    }

    label {
        display: block;
        margin-top: 10px;
        font-weight: bold;
    }

    input {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
        border: 1px solid #ccc;
        border-radius: 4px;
    }

    button {
        width: 100%;
        margin-top: 15px;
        padding: 10px;
        background-color: #007bff;
        border: none;
        color: white;
        font-size: 16px;
        border-radius: 5px;
        cursor: pointer;
    }

    button:hover {
        background-color: #0056b3;
    }
</style>
<body>
    <h1 class="title">Student Records</h1><br>
    <table border="2">
       <tr>
        <th>name</th>
        <th>age</th>
        <th>course</th>
        <th>Edit</th>
        <th>Delete</th>
       </tr>
     {% for x in data %}

     <tr>
        <td>{{ x.name }}</td>
        <td>{{ x.age }}</td>
        <td>{{ x.course }}</td>

        <td><a href="{% url 'std_update' x.id %}" class="edit">Edit</a></td>
        <td><a href="{% url 'std_delete' x.id %}" class="delete">Delete</a></td>
    </tr>
     {% endfor %}
    </table>

    <hr>

        <form action="" method="POST">
            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit">submit</button>

        </form>
</body>
</html>
